{{ define "main" }}
{{ partial "profile.html" . }}

<div id="list-page">
    {{.Content}}
    {{ $pages := .Site.RegularPages }}
    {{ range $pages }}
        {{ $title := .Title }}
        {{ $summary := .Summary }}
        <section class="item">
          <div>
            <h1 class="title"><a href='{{ .RelPermalink }}'>{{ $title }}</a></h1>
          </div>

          <div class="summary">{{ .Description }}</div>

        </section>
    {{ end }}


</div>
{{ end }}
